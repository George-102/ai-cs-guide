<script>
    // 覆盖 Giscus 默认主题
    function overrideGiscusTheme() {
        const siteTheme = document.body.getAttribute('data-md-color-scheme');
        const giscusTheme = siteTheme === 'slate' ? 'dark' : 'light';
        const frame = document.querySelector('.giscus-frame');
        if (frame) {
            frame.contentWindow.postMessage(
                { giscus: { setConfig: { theme: giscusTheme } } },
                'https://giscus.app'
            );
        }
    }
    
    // 监听 Giscus 加载和主题切换
    const observer = new MutationObserver(function(mutations, obs) {
        if (document.querySelector('.giscus-frame')) {
            overrideGiscusTheme();
            obs.disconnect();
        }
    });
    observer.observe(document.body, { childList: true, subtree: true });
    
    document.querySelector('[data-md-component="palette"]')?.addEventListener('change', overrideGiscusTheme);
</script>
