site_name: AI-CS Learning Guide
site_url: https://george-102.github.io/ai-cs-guide/
site_author: Christopher
site_description: a guide for learning AI-CS

repo_name: ai-cs-guide
repo_url: https://github.com/George-102/ai-cs-guide

copyright: Copyright &copy; 2026-present <a href="https://github.com/George-102" target="_blank" rel="noopener noreferrer">Christopher</a>

theme:
  name: material
  custom_dir: overrides  
  language: zh
  static_templates:
    - 404.html
  favicon: images/favicon.svg
  apple-touch-icon-precomposed: images/favicon.png
  include_search_page: false
  search_index_only: true

  features:
    - header.autohide
    - navigation.tracking
    - navigation.top
    - search.highlight
    - search.share
    - search.suggest
    - content.code.annotate
    - comments

  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: 'deep purple'
      accent: 'pink'
      toggle:
        icon: material/weather-sunny
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: 'deep green'
      accent: 'lime'
      toggle:
        icon: material/weather-night
        name: Switch to light mode

  font:
    text: Roboto Slab
    code: Roboto Mono
  icon:
    repo: fontawesome/brands/github # 右上角 GitHub 链接按钮的图标
    previous: material/arrow-left-circle # 自定义“上一页”图标
    next: material/arrow-right-circle  

  # 如果没有 overrides 文件夹，删除下面这行或注释掉
  # custom_dir: overrides

markdown_extensions:
  - attr_list
  - md_in_html
  - footnotes

plugins:
  - i18n:
      languages:
        - locale: zh
          default: true
          name: 简体中文
          build: true
        - locale: en
          name: English
          build: true
          site_name: AI-CS Learning Guide
          nav_translations:
            前言: Foreword
            如何使用这本指南: How to Use This Guide
            一份仅供参考的学习规划: A learning plan for reference only
            工具和方法: Tools and Methods
            数学基础: Math Foundation
            编程语言: Programming Languages
            数据结构与算法: Data Structures and Algorithms
            计算机体系结构: Computer Architecture
            操作系统: Operating Systems
            计算机网络: Computer Networks
            数据库系统: Database Systems
            编译原理: Compiler Theory
            软件工程: Software Engineering
            分布式系统: Distributed Systems
            计算机图形学: Computer Graphics
            机器学习: Machine Learning
            深度学习: Deep Learning
            强化学习: Reinforcement Learning
            提示工程指南: Prompt Engineering Guide
            提示工程: Prompt Engineering
            Context Engineering: Context Engineering Guide
            Harness Engineering: Harness Engineering Guide
            AI辅助编程: AI Coding
            AI基础与大模型: Foundation Models
            RAG与知识库: RAG & Knowledge Base
            AI Agent与工作流: AI Agents & Workflow
            AI工程化与部署: AI Engineering & Deployment
            AI安全与对齐: AI Safety & Alignment
            Python官方教程: Python official documentation
            科学上网: GFW
            Git: Git
            Docker: Docker
            LaTeX: LaTeX
            GNU Make: GNU Make
            VS Code: VS Code
            WSL: WSL
            Oh My Zsh: Oh My Zsh
            Stack Overflow: Stack Overflow
            Obsidian: Obsidian
            Python项目管理: Python Project Management
            工作流: Workflow
            工具箱: Toolbox
            AI辅助编程导论: AI Coding Introduction
            测试驱动开发: Test-Driven Development
            Claude Code指南: Claude Code Guide


  - search:
      lang:
        - zh
        - en
  - git-revision-date:
  - minify:
      minify_html: true
  - open-in-new-tab:

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/George-102/ai-cs-guide/

