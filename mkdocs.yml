site_name: "AI-CS Learning Guide"
site_url: https://你的用户名.github.io/ai-cs-guide/

theme:
  name: material
  features:
    - navigation.sections
  palette:
    - scheme: default
      toggle:
        icon: material/brightness-7    # 修正：用连字符，不是斜杠
        name: 切换深色模式
    - scheme: slate
      toggle:
        icon: material/brightness-4    # 修正：用连字符，不是斜杠
        name: 切换浅色模式

nav:
  - Home: en/index.md
  - Python Basics: en/python-basics.md

plugins:
  - search
  - i18n:
      docs_structure: folder
      languages:
        - locale: en
          default: true
          name: English
          build: true
        - locale: zh
          name: 中文
          build: true
          nav_translations:
            Home: 首页
            Python Basics: Python基础